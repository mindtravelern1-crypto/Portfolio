  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: "Noto Serif TC", "Cormorant Garamond", Georgia, serif;
      font-weight: 300;
      color: #1a1a1a;
      background: #f5f4f0;
      text-rendering: optimizeLegibility;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; }
    ::selection { background: rgba(26,26,26,0.12); }

    /* Reusable keyframes */
    @keyframes fup {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0.6; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.18; }
    }
    @keyframes drawLine {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes letterSpread {
      from { letter-spacing: -0.05em; opacity: 0; }
      to   { letter-spacing: 0.24em; opacity: 1; }
    }

    /* Display utility — Latin words inside Chinese */
    .latin {
      font-family: "Cormorant Garamond", "Noto Serif TC", Georgia, serif;
      font-style: italic;
      font-weight: 400;
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 300; }

    /* Striped placeholder pattern */
    .stripe-bg {
      background:
        repeating-linear-gradient(
          45deg,
          transparent 0 14px,
          rgba(26,26,26,0.05) 14px 15px
        ),
        #ece9e2;
    }
    .stripe-bg-dark {
      background:
        repeating-linear-gradient(
          45deg,
          transparent 0 14px,
          rgba(240,239,233,0.05) 14px 15px
        ),
        #1a1a1a;
    }

    /* Paper grain (very subtle) */
    .grain::before {
      content: "";
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PScwIDAgMjAwIDIwMCcgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC44MicgbnVtT2N0YXZlcz0nNCcgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJyBmaWx0ZXI9J3VybCglMjNuKScgb3BhY2l0eT0nMC4wMycvPjwvc3ZnPg==");

    /* Hover underline link */
    .ul {
      position: relative; text-decoration: none; padding-bottom: 0.18rem;
      border-bottom: 1px solid rgba(26,26,26,0.22);
      transition: opacity 0.25s ease, border-color 0.25s ease;
